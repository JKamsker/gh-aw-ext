name: Patch gh-aw Codex lockfiles
description: Patch generated gh-aw Codex lockfiles for a secret-backed endpoint.
inputs:
  paths:
    description: Newline-separated lockfile paths. Defaults to all .github/workflows/*.lock.yml files.
    required: false
    default: ""
  secret-name:
    description: Repository secret name containing the endpoint base URL.
    required: false
    default: CODEX_LB_BASE_URL
  reasoning-effort:
    description: Codex model_reasoning_effort value to inject. Empty disables injection.
    required: false
    default: high
runs:
  using: composite
  steps:
    - shell: bash
      env:
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_SECRET_NAME: ${{ inputs.secret-name }}
        INPUT_REASONING_EFFORT: ${{ inputs.reasoning-effort }}
      run: |
        set -euo pipefail
        export PYTHONPATH="${GITHUB_ACTION_PATH}/../../src${PYTHONPATH:+:${PYTHONPATH}}"
        python3 - <<'PY'
        import os
        import subprocess
        import sys

        paths = [line.strip() for line in os.environ.get("INPUT_PATHS", "").splitlines() if line.strip()]
        command = [
            sys.executable,
            "-m",
            "gh_aw_priv",
            "patch-lockfiles",
            "--secret-name",
            os.environ["INPUT_SECRET_NAME"],
        ]
        effort = os.environ.get("INPUT_REASONING_EFFORT", "")
        if effort:
            command.extend(["--reasoning-effort", effort])
        else:
            command.append("--no-reasoning-effort")
        command.extend(paths)
        subprocess.run(command, check=True)
        PY
